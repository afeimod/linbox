name: Wine ARM64 WOW64 构建（基于 llvm-mingw）

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine 分支'
        required: false
        default: 'staging'
        type: choice
        options:
        - vanilla
        - staging
        - staging-tkg
        - staging-tkg-fsync
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  BUILD_DIR: /tmp/build_wine
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 彻底修复 APT 源：同时配置 amd64 和 arm64 源，避免 404
      # 参照 Dockerfile.txt 的处理方式
      # ------------------------------------------------------------
      - name: 添加 ARM64 架构并重新配置 APT 源
        run: |
          sudo dpkg --add-architecture arm64

          # 备份原始 sources.list
          sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak

          # 生成新的 sources.list，明确指定架构
          sudo tee /etc/apt/sources.list > /dev/null <<'EOF'
          # amd64 sources (archive.ubuntu.com)
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu noble-security main restricted universe multiverse

          # arm64 sources (ports.ubuntu.com)
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          # 更新包列表
          sudo apt update
          sudo apt --fix-broken install -y

      # ------------------------------------------------------------
      # 安装所有构建依赖（主机架构 + arm64 库）
      # 严格参照 Dockerfile.txt 中的包列表
      # ------------------------------------------------------------
      - name: 安装基础工具和交叉编译工具链
        run: |
          sudo apt install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            cmake \
            debhelper \
            dh-make \
            dpkg-dev \
            fakeroot \
            flex \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            gettext \
            git \
            libc-dev-arm64-cross \
            libtool \
            make \
            ninja-build \
            pkg-config \
            python3 \
            python3-setuptools \
            wget \
            curl \
            ca-certificates \
            nano \
            screen \
            clang \
            llvm \
            lld \
            nasm \
            gtk-doc-tools \
            binutils-aarch64-linux-gnu

      - name: 安装主机架构开发库（amd64）
        run: |
          sudo apt install -y \
            libfreetype6-dev \
            libglib2.0-dev \
            libltdl-dev \
            libxcb1-dev \
            libx11-dev \
            librsvg2-bin \
            libxinerama-dev \
            libfontconfig-dev \
            libepoxy-dev \
            libsdl2-dev \
            libxcursor-dev \
            libxi-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libxrandr-dev \
            libxrender-dev \
            libxfixes-dev \
            libxcomposite-dev \
            libdbus-1-dev \
            libsane-dev \
            libusb-1.0-0-dev \
            libv4l-dev \
            libpulse-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            libudev-dev \
            libunwind-dev \
            libfontconfig1-dev \
            libkrb5-dev \
            libvulkan-dev \
            vulkan-tools \
            mesa-vulkan-drivers \
            libgl-dev \
            libgnutls28-dev \
            libcups2-dev \
            libxkbcommon-dev \
            libxkbregistry-dev \
            libwayland-dev

      - name: 安装 ARM64 目标架构开发库
        run: |
          sudo apt install -y \
            libfreetype6-dev:arm64 \
            libglib2.0-dev:arm64 \
            libltdl-dev:arm64 \
            libxcb1-dev:arm64 \
            libx11-dev:arm64 \
            libxinerama-dev:arm64 \
            libfontconfig-dev:arm64 \
            libepoxy-dev:arm64 \
            libsdl2-dev:arm64 \
            libxcursor-dev:arm64 \
            libxi-dev:arm64 \
            libxshmfence-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libxrandr-dev:arm64 \
            libxrender-dev:arm64 \
            libxfixes-dev:arm64 \
            libxcomposite-dev:arm64 \
            libdbus-1-dev:arm64 \
            libsane-dev:arm64 \
            libusb-1.0-0-dev:arm64 \
            libv4l-dev:arm64 \
            libpulse-dev:arm64 \
            libgstreamer1.0-dev:arm64 \
            libgstreamer-plugins-base1.0-dev:arm64 \
            libgstreamer-plugins-bad1.0-dev:arm64 \
            libudev-dev:arm64 \
            libunwind-dev:arm64 \
            libfontconfig1-dev:arm64 \
            libkrb5-dev:arm64 \
            libvulkan-dev:arm64 \
            libgl-dev:arm64 \
            libgnutls28-dev:arm64 \
            libcups2-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libxkbregistry-dev:arm64 \
            libwayland-dev:arm64 \
            libstdc++6-arm64-cross \
            libstdc++-12-dev-arm64-cross

      # ------------------------------------------------------------
      # 安装 llvm-mingw 交叉编译工具链
      # ------------------------------------------------------------
      - name: 下载并安装 llvm-mingw
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          sudo tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          sudo rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          # 将 llvm-mingw 的 bin 目录加入 PATH
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      # ------------------------------------------------------------
      # 设置中文语言环境
      # ------------------------------------------------------------
      - name: 设置中文语言环境
        run: |
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LANG=zh_CN.UTF-8
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 获取 Wine 源码（根据分支和版本）
      # ------------------------------------------------------------
      - name: 获取 Wine 源码
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"

          sudo mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}

          case "$WINE_BRANCH" in
            staging-tkg|staging-tkg-fsync)
              echo "处理 TKG 系列分支: $WINE_BRANCH"
              sudo git clone https://github.com/Kron4ek/wine-tkg.git source
              cd source
              if [ "$WINE_BRANCH" = "staging-tkg-fsync" ]; then
                sudo git checkout fsync
              fi
              if [ "$WINE_VERSION" != "latest" ]; then
                sudo git checkout "$WINE_VERSION" 2>/dev/null || sudo git checkout "wine-$WINE_VERSION" 2>/dev/null || echo "使用默认分支"
              fi
              if [ -f "VERSION" ]; then
                WINE_VERSION_ACTUAL="$(cat VERSION | tail -c +14)"
              else
                WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              fi
              ;;
            staging)
              echo "处理 Staging 分支"
              sudo git clone https://github.com/afeimod/wine-arm.git source
              cd source
              sudo git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                sudo git checkout "wine-$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              # 下载并应用 staging 补丁
              PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
              STAGING_VERSION="v${PURE_VERSION}"
              wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/${STAGING_VERSION}.tar.gz" || \
              wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/v${PURE_VERSION}.tar.gz"
              if [ -f "wine-staging-${PURE_VERSION}.tar.gz" ]; then
                tar -xzf "wine-staging-${PURE_VERSION}.tar.gz"
                STAGING_DIR=$(find . -maxdepth 1 -type d -name "*staging*" | head -1)
                if [ -n "$STAGING_DIR" ] && [ -d "$STAGING_DIR/staging" ]; then
                  cd "$STAGING_DIR/staging"
                  chmod +x patchinstall.py
                  ./patchinstall.py --all --destdir=../../
                  cd ../..
                else
                  echo "警告: 未找到 staging 补丁目录，跳过补丁应用"
                fi
              else
                echo "警告: 无法下载 staging 补丁，继续构建无补丁版本"
              fi
              ;;
            vanilla)
              echo "处理 Vanilla 分支"
              sudo git clone https://github.com/afeimod/wine-arm.git source
              cd source
              sudo git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                sudo git checkout "wine-$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            *)
              echo "未知的 Wine 分支: $WINE_BRANCH"
              exit 1
              ;;
          esac

          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"

      # ------------------------------------------------------------
      # 修复 Termux 路径问题
      # ------------------------------------------------------------
      - name: 修复 Termux 路径问题
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          echo "修复 Termux 路径问题..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          echo "路径修复完成"

      # ------------------------------------------------------------
      # 应用 mfplat 补丁
      # ------------------------------------------------------------
      - name: 应用 mfplat 补丁
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          PURE_VERSION=$(echo "${{ env.WINE_VERSION_ACTUAL }}" | sed 's/^wine-//')
          VERSION_MAJOR=$(echo "$PURE_VERSION" | cut -d. -f1)
          VERSION_MINOR=$(echo "$PURE_VERSION" | cut -d. -f2)
          if [ "$VERSION_MAJOR" -gt 9 ] || [ "$VERSION_MAJOR" -eq 9 -a "$VERSION_MINOR" -ge 10 ]; then
            echo "应用 9.10+ 补丁 (wine_do_not_create_dxgi_manager2.patch)"
            wget -q https://github.com/afeimod/linbox/raw/main/path/wine_do_not_create_dxgi_manager2.patch
            if [ -f "dlls/mfplat/main.c" ]; then
              patch -p1 < wine_do_not_create_dxgi_manager2.patch || { echo "补丁应用失败"; exit 1; }
            else
              echo "错误: dlls/mfplat/main.c 不存在"
              exit 1
            fi
          else
            echo "应用 9.10 以下补丁 (fix_wine9.2_mfplat.sh)"
            wget -q -O fix_wine9.2_mfplat.sh https://github.com/afeimod/linbox/raw/main/path/fix_wine9.2_mfplat.sh
            chmod +x fix_wine9.2_mfplat.sh
            ./fix_wine9.2_mfplat.sh
          fi

      # ------------------------------------------------------------
      # 生成 configure 脚本
      # ------------------------------------------------------------
      - name: 生成 configure 脚本
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      # ------------------------------------------------------------
      # 构建 native wine64（x86_64）用于生成交叉编译工具
      # ------------------------------------------------------------
      - name: 构建 native wine64 工具
        run: |
          sudo mkdir -p ${{ env.WINE64_DIR }}
          sudo cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}
          sudo mkdir -p amd64
          cd amd64
          # 配置 native wine64（只构建工具依赖）
          sudo ../source/configure --enable-win64 --prefix=/usr/local
          # 构建工具依赖（__tooldeps__ 是内部目标，用于生成 winebuild/wrc/widl 等）
          sudo make __tooldeps__ -j$(nproc)
          # 确保 nls 文件生成（某些版本需要）
          sudo make -C nls || true
          echo "检查生成的工具:"
          ls -la tools/winebuild/ tools/wrc/ tools/widl/ || true

      # ------------------------------------------------------------
      # 交叉编译 ARM64 WOW64
      # ------------------------------------------------------------
      - name: 交叉编译 ARM64 WOW64
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          sudo mkdir -p build-arm64
          cd build-arm64

          # 设置环境变量，确保 llvm-mingw 在 PATH 中
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          # 设置交叉编译标志
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          export CFLAGS="-O2 -pipe"
          export CXXFLAGS="-O2 -pipe"
          export LDFLAGS="-L/usr/lib/aarch64-linux-gnu"

          # 使用与 rules 一致的配置参数
          sudo ../configure \
            --prefix=/tmp/wine-install-wow64 \
            --with-mingw=clang \
            --enable-archs=arm64ec,aarch64,i386 \
            --enable-tools \
            --disable-tests \
            --with-vulkan \
            --with-gstreamer \
            --host=aarch64-linux-gnu \
            host_alias=aarch64-linux-gnu \
            build_alias=x86_64-linux-gnu \
            --with-wine-tools=${{ env.WINE64_DIR }}/amd64/tools \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++

          sudo make -j$(nproc)
          sudo make install

      # ------------------------------------------------------------
      # 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          sudo cp -r /tmp/wine-install-wow64/* wine-package/$PACKAGE_NAME/
          sudo chown -R $USER:$USER wine-package

      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: 发布 Wine 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-arm64
          name: Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} (ARM64 WOW64 for Termux)
          body: |
            # Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} - ARM64 WOW64 for Termux

            ## 版本信息
            - **Wine 分支**: ${{ github.event.inputs.wine_branch || 'staging' }}
            - **Wine 版本**: ${{ github.event.inputs.wine_version || 'latest' }}
            - **主机架构**: ARM64 (aarch64)
            - **目标 Windows 架构**: i386, x86_64, arm64ec (通过 WOW64 模拟)
            - **平台**: Termux (Android)
            - **图形 API**: Vulkan 支持已启用
            - **多媒体**: GStreamer 支持已启用
            - **工具链**: llvm-mingw + 系统 gcc

            ## 特性
            ✓ ARM64 原生 Wine 可执行文件
            ✓ 支持运行 32/64 位 Windows 应用程序
            ✓ Vulkan 渲染
            ✓ GStreamer 多媒体后端
            ✓ 中文环境支持
            ✓ 应用了关键补丁提升兼容性

            ## 安装说明
            解压后，将 `${{ env.BUILD_NAME }}` 文件夹放置在 Termux 的合适位置，并设置环境变量。

            ## 构建信息
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
            - 工作流: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}